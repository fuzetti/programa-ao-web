<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Pets</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="cabecalho">  
     </header>
    <nav id = "nav">
     </nav>
    <article id = "article">
     </article>
    <footer id="rodape">
     </footer>

<script>
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('cabecalho').innerHTML = data;
        });

    fetch('footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('rodape').innerHTML = data;
        });

        fetch('nav.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('nav').innerHTML = data;
        });

        fetch('article.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('article').innerHTML = data;
        });

</script>
   
    <script src="js/script.js"></script>
</body>
</html>
