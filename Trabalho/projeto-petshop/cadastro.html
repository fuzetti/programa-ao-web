<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Natura PetShop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="login-container">
        <h2>Criar Nova Conta</h2>
        <form id="form-cadastro">
            <label for="newUser">Escolha um Usuário:</label>
            <input type="text" id="newUser" required>
            
            <label for="newPass">Escolha uma Senha:</label>
            <input type="password" id="newPass" required>
            
            <button type="submit" class="btn btn-editar" style="width:100%">Salvar Cadastro</button>
        </form>
        
        <p style="text-align:center; margin-top:15px;">
            Já possui conta? <a href="login.html">Fazer Login</a>
        </p>
    </main>

    <script>
        document.getElementById('form-cadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const novoUsuario = document.getElementById('newUser').value;
            const novaSenha = document.getElementById('newPass').value;

            // Salva no sessionStorage (apaga quando fechar a aba)
            sessionStorage.setItem('petshop_user', novoUsuario);
            sessionStorage.setItem('petshop_pass', novaSenha);

            alert('Cadastro realizado! Você será redirecionado para o login.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
